---
version: "2"
linters:
  default: all
  disable:
    - wsl
    - gomodguard
    - depguard
    - tagliatelle
    - nolintlint
    - varnamelen
    - ireturn
    - revive
    - lll
    - funcorder
    - noinlineerr
    - gomoddirectives
    - gosec
  settings:
    wrapcheck:
      ignore-package-globs:
        - github.com/labstack/echo/v5
